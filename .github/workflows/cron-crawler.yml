name: 每小时自动抓取新闻

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crawler-singleton
  cancel-in-progress: false

jobs:
  crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 安装依赖
        run: |
          pip install Pillow deep-translator -q
          sudo apt-get install -y -q fonts-noto-cjk 2>/dev/null || true

      - name: 抓取翻译并发布
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, http.cookiejar, time, io, os, re
          from PIL import Image, ImageDraw, ImageFont
          from deep_translator import GoogleTranslator

          WP = "http://43.172.68.14"
          MAX_ARTICLES = 10
          FONT_PATH = "/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc" if os.path.exists("/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc") else None

          def translate(text, target='zh-TW'):
              """翻译为繁体中文，短文本直接翻，长文本分段翻"""
              if not text or len(text.strip()) < 3: return text
              clean = re.sub(r'【[^】]*】', '', text).strip()
              try:
                  if len(clean) <= 500:
                      return GoogleTranslator(source='auto', target=target).translate(clean)
                  else:
                      parts = [clean[i:i+400] for i in range(0, len(clean), 400)]
                      return ' '.join([GoogleTranslator(source='auto', target=target).translate(p) for p in parts[:2]])
              except Exception as e:
                  print(f"    翻译失败: {str(e)[:80]}")
                  return text  # fallback to original

          # === 1. Get articles from Vercel ===
          print("=== 从 Vercel 获取数据 ===")
          try:
              resp = urllib.request.urlopen("https://globalchineaenews.com/api/crawler-data?secret=mynews2026", timeout=35)
              data = json.loads(resp.read().decode())
              articles = data.get("articles", [])
              print(f"获取 {len(articles)} 篇英文文章")
          except Exception as e:
              print(f"Vercel 失败: {e}")
              exit(1)
          if not articles:
              print("无文章")
              exit(0)

          # === 2. WP Login ===
          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))
          opener.open(urllib.request.Request(f"{WP}/wp-login.php", data=urllib.parse.urlencode({"log":"admin","pwd":"X3scdhTmzwls","wp-submit":"登入","testcookie":"1"}).encode()))
          nonce = opener.open(urllib.request.Request(f"{WP}/wp-admin/admin-ajax.php?action=rest-nonce")).read().decode().strip()
          before = int(opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1")).headers.get("X-WP-Total","0"))
          print(f"WP 登入成功，现有 {before} 篇\n")

          # === 3. Category colors for images ===
          cat_colors = {"world-cup":("#0d5e2e","#ffd700"), "world":("#1a2a4a","#4a90d9"),
                        "cross-strait":("#8b0000","#ff4444"), "lifestyle":("#e65100","#ff9800"),
                        "immigration-study":("#4a148c","#ce93d8"), "breaking-news":("#263238","#ff6f00")}

          cat_map = {"world-cup":2,"breaking-news":3,"world":4,"cross-strait":5,"lifestyle":6,"immigration-study":7}
          cat_names = {2:"世盃",3:"即时",4:"国际",5:"两岸",6:"华人",7:"移民"}
          count = 0

          for i, art in enumerate(articles):
              if count >= MAX_ARTICLES: break

              cat = art.get("category","breaking-news")
              cat_id = cat_map.get(cat, 3)

              # === Translate title & summary ===
              print(f"  [{i+1}] 翻译: {art['title'][:60]}")
              zh_title = translate(art['title'][:120])
              zh_summary = translate(art['summary'][:350])

              # Clean up translation
              zh_title = re.sub(r'【[^】]*】', '', zh_title).strip()
              prefixes = ['速報','快訊','最新','即時']
              zh_title = f"【{prefixes[hash(art['title'])%4]}】{zh_title[:100]}"

              # === Generate matching image ===
              bg, accent = cat_colors.get(cat, ("#263238","#ff6f00"))
              img = Image.new("RGB", (1200, 630), bg)
              draw = ImageDraw.Draw(img)

              # Gradient background
              for y in range(630):
                  a = y / 630
                  r = int(int(bg[1:3],16)*(1-a) + int(bg[3:5],16)*a*0.3)
                  g = int(int(bg[3:5],16)*(1-a) + int(bg[5:7],16)*a*0.3)
                  b = int(int(bg[5:7],16)*(1-a) + 30*a)
                  draw.line([(0,y),(1200,y)], fill=(r,g,b))

              # Accent bar at bottom
              draw.rectangle([(0,600),(1200,630)], fill=accent)

              # Decorative shapes based on category
              import random; random.seed(hash(art['title']) % 10000)
              for _ in range(20):
                  x, y = random.randint(30,1170), random.randint(30,580)
                  s = random.randint(3,10)
                  draw.ellipse([(x,y),(x+s,y+s)], fill=accent+"55")

              # Category label
              try:
                  font_lg = ImageFont.truetype(FONT_PATH, 22) if FONT_PATH else ImageFont.load_default()
                  draw.text((30, 15), f"  {cat_names.get(cat_id,'即时')}  ", fill="#ffffffcc", font=font_lg)
              except: pass

              # Title overlay
              display_title = re.sub(r'【[^】]*】', '', zh_title)[:25]
              try:
                  font_t = ImageFont.truetype(FONT_PATH, 44) if FONT_PATH else ImageFont.load_default()
                  # Word wrap
                  lines = [display_title[i:i+15] for i in range(0, len(display_title), 15)]
                  for li, line in enumerate(lines[:3]):
                      draw.text((60, 200 + li*70), line, fill="#ffffff", font=font_t)
              except: pass

              buf = io.BytesIO()
              img.save(buf, "JPEG", quality=85)
              buf.seek(0)

              # === Upload image ===
              boundary = f"---WPIMG{i}---"
              img_data = (f"--{boundary}\r\nContent-Disposition: form-data; name=\"file\"; filename=\"news_{i}.jpg\"\r\nContent-Type: image/jpeg\r\n\r\n").encode() + buf.read() + f"\r\n--{boundary}--\r\n".encode()

              img_id = None
              try:
                  req = urllib.request.Request(f"{WP}/wp-json/wp/v2/media", data=img_data,
                      headers={"Content-Type":f"multipart/form-data; boundary={boundary}","X-WP-Nonce":nonce}, method="POST")
                  img_id = json.loads(opener.open(req).read().decode())["id"]
              except Exception as e:
                  print(f"    ⚠ 图片失败: {str(e)[:60]}")

              # === Post article ===
              src = art["sourceUrl"]
              domain = art["domain"]
              img_html = f'<figure class="wp-block-image size-large"><img src="http://43.172.68.14/wp-content/uploads/2026/06/news_{i}.jpg" alt="" style="width:100%;border-radius:8px;"/></figure>\n' if img_id else ''

              content = f'''{img_html}<p>{zh_summary}（本文為資訊摘要整理。）</p>
          <hr style="margin:24px 0;border:none;border-top:1px solid #e5e5e5;"/>
          <div style="background:#f8f8f8;padding:16px;border-radius:6px;font-size:13px;color:#666;line-height:1.8;">
          <p style="margin:0 0 8px;font-weight:600;color:#444;">📋 版權與免責聲明</p>
          <p style="margin:0 0 4px;">• 本文為新聞資訊摘要整理，原文來源：<a href="{src}" target="_blank" rel="noopener noreferrer nofollow" style="color:#c41e3a;">{domain}</a></p>
          <p style="margin:0 0 4px;">• 原文版權歸原作者及原發布機構所有，本網站僅在合理使用範圍內進行新聞摘要報導。</p>
          <p style="margin:0 0 4px;">• 本網站不為使用者轉載、引用本文內容所引發的任何法律爭議承擔責任。</p>
          <p style="margin:0;">• 如著作權人認為本文超出合理使用範圍，請通過<a href="https://globalchineaenews.com/takedown" style="color:#c41e3a;">侵權刪除頁面</a>聯繫我們，將在48小時內處理。</p>
          </div>'''

              body = json.dumps({"title":zh_title,"content":content,"status":"publish","categories":[cat_id],"featured_media":img_id or 0,"meta":{"_original_url":src,"_is_automated_fetch":True}}).encode()

              try:
                  resp = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts", data=body,
                      headers={"Content-Type":"application/json","X-WP-Nonce":nonce}, method="POST"))
                  pid = json.loads(resp.read().decode())["id"]
                  print(f"    ✓ #{pid} [{cat_names.get(cat_id,'?')}] {zh_title[:55]}")
                  count += 1
                  time.sleep(2)
              except Exception as e:
                  err = e.read().decode() if hasattr(e,'read') else str(e)
                  print(f"    ✗ {str(err)[:80]}")

          after = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1")).headers.get("X-WP-Total","?")
          print(f"\n{'='*45}")
          print(f"发布: {count}篇 | 总数: {before}→{after}")
          PYEOF
