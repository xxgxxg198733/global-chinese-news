name: 每小时自动抓取新闻

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crawler-singleton
  cancel-in-progress: false

jobs:
  crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 调用 Vercel 抓取（RSS解析+摘要生成）
        id: crawl
        run: |
          RESPONSE=$(curl -s --max-time 60 \
            "https://globalchineaenews.com/api/crawler?secret=${{ secrets.VERCEL_CRON_SECRET }}")
          echo "$RESPONSE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(f\"RSS解析: {d['itemsFound']}条 | 发布: {d['itemsPublished']} | 失败: {d['itemsFailed']}\")
          " 2>/dev/null || echo "Crawl failed"

      - name: 直接抓取并发布（绕过Vercel网络限制）
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, http.cookiejar, re, os, time, hashlib

          WP = "http://43.172.68.14"
          USER = "admin"
          PASS = "X3scdhTmzwls"
          MAX_ARTICLES = 10

          feeds = [
              "https://www.france24.com/en/rss",
              "https://feeds.bbc.co.uk/news/world/rss.xml",
          ]

          # === 1. WP Login ===
          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))
          data = urllib.parse.urlencode({"log":USER,"pwd":PASS,"wp-submit":"登入","testcookie":"1"}).encode()
          opener.open(urllib.request.Request(f"{WP}/wp-login.php", data=data))
          nonce = opener.open(urllib.request.Request(f"{WP}/wp-admin/admin-ajax.php?action=rest-nonce")).read().decode().strip()
          print(f"WP登录成功, nonce: {nonce[:8]}...")

          # === 2. Parse RSS ===
          def parse_rss(xml):
              items = []
              for m in re.finditer(r'<item>(.*?)</item>', xml, re.S):
                  block = m.group(1)
                  tag = lambda t: (re.search(f'<{t}[^>]*>(.*?)</{t}>', block, re.S) or [None,None])[1] or ''
                  title = tag('title').replace('<![CDATA[','').replace(']]>','').strip()
                  title = re.sub(r'<[^>]*>', '', title).strip()
                  link = tag('link').strip()
                  desc = tag('description').replace('<![CDATA[','').replace(']]>','').strip()
                  desc = re.sub(r'<[^>]*>', ' ', desc).strip()
                  if title and link:
                      items.append({'title':title, 'link':link, 'desc':desc})
              return items

          all_items = []
          for feed_url in feeds:
              try:
                  xml = urllib.request.urlopen(feed_url, timeout=15).read().decode('utf-8', errors='ignore')
                  items = parse_rss(xml)
                  all_items.extend(items)
                  print(f"  RSS: {feed_url.split('/')[2]} → {len(items)}条")
              except Exception as e:
                  print(f"  RSS失败: {feed_url.split('/')[2]} — {e}")

          print(f"共 {len(all_items)} 条")

          # === 3. Post to WordPress ===
          count = 0
          seen = set()
          for item in all_items[:MAX_ARTICLES*2]:
              if count >= MAX_ARTICLES: break

              # Dedup
              h = hashlib.md5(item['link'].encode()).hexdigest()[:12]
              if h in seen: continue
              seen.add(h)

              # Title rewrite
              prefixes = ['速報','快訊','最新','即時']
              new_title = f"【{prefixes[hash(item['title'])%4]}】{item['title'][:80]}"

              # Summary from RSS description
              desc = item['desc'][:300].strip()
              if len(desc) < 30: continue

              # Category detection
              txt = new_title + desc
              cat_id = 2 if any(k in txt for k in ['世界盃','足球','FIFA','World Cup']) else 4

              domain = item['link'].split('/')[2].replace('www.','')

              disclaimer = f'<hr style="margin:24px 0;border:none;border-top:1px solid #e5e5e5;"><div style="background:#f8f8f8;padding:16px;border-radius:6px;font-size:13px;color:#666;line-height:1.8;"><p style="margin:0 0 8px;font-weight:600;color:#444;">📋 版權與免責聲明</p><p style="margin:0 0 4px;">• 本文為新聞資訊摘要整理，原文來源：<a href="{item["link"]}" target="_blank" rel="noopener noreferrer nofollow" style="color:#c41e3a;">{domain}</a></p><p style="margin:0 0 4px;">• 原文版權歸原作者及原發布機構所有。本網站僅在合理使用範圍內進行新聞摘要報導。</p><p style="margin:0 0 4px;">• 本網站不為使用者轉載、引用本文內容所引發的任何法律爭議承擔責任。</p><p style="margin:0;">• 如著作權人認為本文超出合理使用範圍，請通過<a href="https://globalchineaenews.com/takedown" style="color:#c41e3a;">侵權刪除頁面</a>聯繫我們，將在48小時內處理。</p></div>'

              content = f'<p>{desc}（本文為資訊摘要整理。）</p>{disclaimer}'

              body = json.dumps({
                  "title": new_title,
                  "content": content,
                  "status": "publish",
                  "categories": [cat_id]
              }).encode()

              try:
                  req = urllib.request.Request(
                      f"{WP}/wp-json/wp/v2/posts",
                      data=body,
                      headers={"Content-Type":"application/json","X-WP-Nonce":nonce},
                      method="POST"
                  )
                  resp = opener.open(req)
                  result = json.loads(resp.read().decode())
                  pid = result.get("id","?")
                  print(f"  ✓ #{pid} — {new_title[:50]}")
                  count += 1
                  time.sleep(1)
              except Exception as e:
                  err = e.read().decode() if hasattr(e,'read') else str(e)
                  print(f"  ✗ — {str(err)[:80]}")

          print(f"\n发布完成: {count}/{MAX_ARTICLES} 篇")
          PYEOF
