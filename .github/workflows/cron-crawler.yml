name: 每小时自动抓取新闻

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crawler-singleton
  cancel-in-progress: false

jobs:
  crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 抓取 RSS 并发布到 WordPress
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, http.cookiejar, time, hashlib

          WP = "http://43.172.68.14"
          USER = "admin"
          PASS = "X3scdhTmzwls"

          # === 1. Get articles from Vercel ===
          print("=== 从 Vercel 获取 RSS 数据 ===")
          try:
              resp = urllib.request.urlopen(
                  "https://globalchineaenews.com/api/crawler-data?secret=mynews2026", timeout=30
              )
              data = json.loads(resp.read().decode())
              articles = data.get("articles", [])
              print(f"获取 {len(articles)} 篇文章")
          except Exception as e:
              print(f"Vercel 请求失败: {e}")
              exit(1)

          if not articles:
              print("无文章，退出")
              exit(0)

          # === 2. WP Login ===
          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))
          data = urllib.parse.urlencode({"log":USER,"pwd":PASS,"wp-submit":"登入","testcookie":"1"}).encode()
          opener.open(urllib.request.Request(f"{WP}/wp-login.php", data=data))
          nonce = opener.open(urllib.request.Request(f"{WP}/wp-admin/admin-ajax.php?action=rest-nonce")).read().decode().strip()

          before_resp = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1"))
          total_before = int(before_resp.headers.get("X-WP-Total", "0"))
          print(f"WP 登录成功，当前 {total_before} 篇\n")

          # === 3. Post each article ===
          cat_map = {"world-cup":2, "breaking-news":3, "world":4, "cross-strait":5, "lifestyle":6, "immigration-study":7}
          MAX = 10
          count = 0

          for art in articles:
              if count >= MAX: break

              cat_id = cat_map.get(art.get("category",""), 3)
              src = art["sourceUrl"]
              domain = art["domain"]
              disclaimer = (
                  '<hr style="margin:24px 0;border:none;border-top:1px solid #e5e5e5;">'
                  '<div style="background:#f8f8f8;padding:16px;border-radius:6px;font-size:13px;color:#666;line-height:1.8;">'
                  '<p style="margin:0 0 8px;font-weight:600;color:#444;">📋 版權與免責聲明</p>'
                  f'<p style="margin:0 0 4px;">• 本文為新聞資訊摘要整理，原文來源：<a href="{src}" target="_blank" rel="noopener noreferrer nofollow" style="color:#c41e3a;">{domain}</a></p>'
                  '<p style="margin:0 0 4px;">• 原文版權歸原作者及原發布機構所有。本網站僅在合理使用範圍內進行新聞摘要報導。</p>'
                  '<p style="margin:0 0 4px;">• 本網站不為使用者轉載、引用本文內容所引發的任何法律爭議承擔責任。</p>'
                  '<p style="margin:0;">• 如著作權人認為本文超出合理使用範圍，請通過<a href="https://globalchineaenews.com/takedown" style="color:#c41e3a;">侵權刪除頁面</a>聯繫我們，將在48小時內處理。</p>'
                  '</div>'
              )
              content = f'<p>{art["summary"]}（本文為資訊摘要整理。）</p>{disclaimer}'

              body = json.dumps({
                  "title": art["title"],
                  "content": content,
                  "status": "publish",
                  "categories": [cat_id],
                  "meta": {"_original_url": src, "_is_automated_fetch": True}
              }).encode()

              try:
                  req = urllib.request.Request(
                      f"{WP}/wp-json/wp/v2/posts", data=body,
                      headers={"Content-Type":"application/json","X-WP-Nonce":nonce},
                      method="POST"
                  )
                  resp = opener.open(req)
                  result = json.loads(resp.read().decode())
                  pid = result.get("id","?")
                  cat_names = {"2":"世盃","3":"即时","4":"国际","5":"两岸","6":"华人","7":"移民"}
                  print(f"  ✓ #{pid} [{cat_names.get(str(cat_id),'?')}] {art['title'][:55]}")
                  count += 1
                  time.sleep(1.5)
              except Exception as e:
                  err = e.read().decode() if hasattr(e,'read') else str(e)
                  print(f"  ✗ {str(err)[:80]}")

          after_resp = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1"))
          total_after = int(after_resp.headers.get("X-WP-Total","0"))
          print(f"\n{'='*45}")
          print(f"发布: {count}篇 | 总数: {total_before}→{total_after}")
          PYEOF
