name: 每小时自动抓取新闻

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crawler-singleton
  cancel-in-progress: false

jobs:
  crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 安装 Pillow
        run: pip install Pillow -q

      - name: 抓取并发布
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, http.cookiejar, time, hashlib, os, io, random
          from PIL import Image, ImageDraw, ImageFont

          WP = "http://43.172.68.14"
          USER = "admin"
          PASS = "X3scdhTmzwls"
          MAX_ARTICLES = 20

          # === 1. Get articles from Vercel ===
          print("=== 从 Vercel 获取数据 ===")
          try:
              resp = urllib.request.urlopen(
                  "https://globalchineaenews.com/api/crawler-data?secret=mynews2026", timeout=30
              )
              data = json.loads(resp.read().decode())
              articles = data.get("articles", [])
              print(f"获取 {len(articles)} 篇")
          except Exception as e:
              print(f"Vercel 失败: {e}")
              exit(1)

          if not articles:
              print("无文章")
              exit(0)

          # === 2. WP Login ===
          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))
          login_data = urllib.parse.urlencode({"log":USER,"pwd":PASS,"wp-submit":"登入","testcookie":"1"}).encode()
          opener.open(urllib.request.Request(f"{WP}/wp-login.php", data=login_data))
          nonce = opener.open(urllib.request.Request(f"{WP}/wp-admin/admin-ajax.php?action=rest-nonce")).read().decode().strip()
          print(f"WP 登入成功\n")

          # === 3. Color schemes for generated images ===
          schemes = [
              ("#0d5e2e","#ffd700"),("#1a2a4a","#ff6b35"),("#3d1a4a","#00d4aa"),
              ("#4a2a1a","#2ed573"),("#1a4a3d","#ffa502"),("#2a1a4a","#7bed9f"),
              ("#4a3d1a","#1e90ff"),("#1a3d4a","#ff4757"),("#3d4a1a","#eccc68"),
              ("#2a4a1a","#ff6348"),("#4a4a1a","#70a1ff"),("#1a4a4a","#f8a5c2"),
              ("#4a1a3d","#778beb"),("#1a2a3d","#f3a683"),("#2a3d1a","#cf6a87"),
              ("#3d2a1a","#a4b0be"),("#4a1a1a","#7bed9f"),("#1a1a4a","#ffd700"),
              ("#2a1a2a","#00d4aa"),("#1a2a2a","#ff6b35"),
          ]

          cat_map = {"world-cup":2,"breaking-news":3,"world":4,"cross-strait":5,"lifestyle":6,"immigration-study":7}
          cat_names = {"2":"世盃","3":"即时","4":"国际","5":"两岸","6":"华人","7":"移民"}
          count = 0

          for i, art in enumerate(articles):
              if count >= MAX_ARTICLES: break

              cat_id = cat_map.get(art.get("category",""), 3)

              # === Generate news image ===
              bg, accent = schemes[i % len(schemes)]
              img = Image.new("RGB", (1200, 630), bg)
              draw = ImageDraw.Draw(img)
              # Gradient
              for y in range(630):
                  alpha = y / 630
                  r = int(int(bg[1:3],16)*(1-alpha) + int(bg[3:5],16)*alpha*0.5)
                  g = int(int(bg[3:5],16)*(1-alpha) + int(bg[5:7],16)*alpha*0.5)
                  b = int(int(bg[5:7],16)*(1-alpha) + 20*alpha)
                  draw.line([(0,y),(1200,y)], fill=(r,g,b))
              # Bottom bar
              draw.rectangle([(0,610),(1200,630)], fill=accent)
              # Circle decor
              for r in [180, 140, 100]:
                  draw.ellipse([(1100-r,140-r),(1100+r,140+r)], outline=accent+"66", width=2)
              # Text with title (first 20 chars)
              try:
                  title_text = art['title'][:20].replace('【','').replace('】','')
                  font = ImageFont.truetype("/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc", 48) if os.path.exists("/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc") else ImageFont.load_default()
                  draw.text((60, 200), title_text, fill="#ffffff", font=font)
              except:
                  pass
              img_bytes = io.BytesIO()
              img.save(img_bytes, "JPEG", quality=85)
              img_bytes.seek(0)

              # === Upload image to WP ===
              boundary = "---WPIMG---"
              img_body = (
                  f"--{boundary}\r\nContent-Disposition: form-data; name=\"file\"; filename=\"news_{i}.jpg\"\r\nContent-Type: image/jpeg\r\n\r\n"
              ).encode() + img_bytes.read() + f"\r\n--{boundary}--\r\n".encode()

              img_id = None
              try:
                  req = urllib.request.Request(
                      f"{WP}/wp-json/wp/v2/media",
                      data=img_body,
                      headers={
                          "Content-Type": f"multipart/form-data; boundary={boundary}",
                          "X-WP-Nonce": nonce,
                      },
                      method="POST"
                  )
                  resp = opener.open(req)
                  result = json.loads(resp.read().decode())
                  img_id = result["id"]
              except Exception as e:
                  print(f"  ⚠ 图片上传失败: {str(e)[:60]}")

              # === Post article ===
              src = art["sourceUrl"]
              domain = art["domain"]
              disclaimer = (
                  '<hr style="margin:24px 0;border:none;border-top:1px solid #e5e5e5;">'
                  '<div style="background:#f8f8f8;padding:16px;border-radius:6px;font-size:13px;color:#666;line-height:1.8;">'
                  '<p style="margin:0 0 8px;font-weight:600;color:#444;">📋 版權與免責聲明</p>'
                  f'<p style="margin:0 0 4px;">• 本文為新聞資訊摘要整理，原文來源：<a href="{src}" target="_blank" rel="noopener noreferrer nofollow" style="color:#c41e3a;">{domain}</a></p>'
                  '<p style="margin:0 0 4px;">• 原文版權歸原作者及原發布機構所有。本網站僅在合理使用範圍內進行新聞摘要報導，不提供全文轉載。</p>'
                  '<p style="margin:0 0 4px;">• 本網站不為使用者轉載、引用本文內容所引發的任何法律爭議承擔責任。</p>'
                  '<p style="margin:0;">• 如著作權人認為本文超出合理使用範圍，請通過<a href="https://globalchineaenews.com/takedown" style="color:#c41e3a;">侵權刪除頁面</a>聯繫我們，將在48小時內處理。</p>'
                  '</div>'
              )

              img_html = f'<figure class="wp-block-image size-large"><img src="{WP}/wp-content/uploads/2026/06/news_{i}.jpg" alt="" style="width:100%;border-radius:8px;"/></figure>\n' if img_id else ''

              content = f'{img_html}<p>{art["summary"]}（本文為資訊摘要整理。）</p>{disclaimer}'

              body = json.dumps({
                  "title": art["title"],
                  "content": content,
                  "status": "publish",
                  "categories": [cat_id],
                  "featured_media": img_id or 0,
                  "meta": {"_original_url": src, "_is_automated_fetch": True}
              }).encode()

              try:
                  req = urllib.request.Request(
                      f"{WP}/wp-json/wp/v2/posts", data=body,
                      headers={"Content-Type":"application/json","X-WP-Nonce":nonce},
                      method="POST"
                  )
                  resp = opener.open(req)
                  result = json.loads(resp.read().decode())
                  pid = result.get("id","?")
                  print(f"  ✓ #{pid} [{cat_names.get(str(cat_id),'?')}] {art['title'][:50]}")
                  count += 1
                  time.sleep(2)
              except Exception as e:
                  err = e.read().decode() if hasattr(e,'read') else str(e)
                  print(f"  ✗ {str(err)[:80]}")

          # Final count
          after = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1"))
          print(f"\n{'='*45}")
          print(f"本次发布: {count}篇 | 网站总文章: {after.headers.get('X-WP-Total','?')}")
          PYEOF
