name: 每小时自动抓取新闻

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: crawler-singleton
  cancel-in-progress: false

jobs:
  crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 安装依赖
        run: pip install deep-translator requests -q

      - name: 抓取翻译配图发布
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.parse, json, http.cookiejar, time, re, requests, io, os
          from deep_translator import GoogleTranslator

          WP = "http://43.172.68.14"
          MAX_ARTICLES = 10

          def translate(text):
              if not text or len(text.strip()) < 3: return text
              clean = re.sub(r'【[^】]*】', '', text).strip()
              try:
                  if len(clean) <= 500:
                      return GoogleTranslator(source='auto', target='zh-TW').translate(clean)
                  parts = [clean[i:i+400] for i in range(0, len(clean), 400)]
                  return ' '.join([GoogleTranslator(source='auto', target='zh-TW').translate(p) for p in parts[:2]])
              except:
                  return text

          def get_image(title_en, title_zh):
              """从英文标题提取关键词，到 Unsplash 搜索匹配图片"""
              # 提取关键英文单词（过滤常见停用词）
              stopwords = {'the','a','an','is','are','was','were','in','on','at','to','for','of','with',
                          'and','or','but','not','this','that','it','its','from','by','as','be','has','have','had'}
              words = [w.lower() for w in re.findall(r'[a-zA-Z]{3,}', title_en) if w.lower() not in stopwords]
              # 取前 3-4 个关键词
              keywords = words[:4] if len(words) >= 3 else words + ['news']
              query = ','.join(keywords)
              url = f"https://source.unsplash.com/1200x630/?{query}"
              try:
                  r = requests.get(url, timeout=10, allow_redirects=True)
                  if r.status_code == 200 and len(r.content) > 5000:
                      print(f"    配图关键词: {query}")
                      return r.content
              except:
                  pass
              # Fallback: broader search
              try:
                  broad = keywords[:2] if len(keywords) >= 2 else keywords
                  r = requests.get(f"https://source.unsplash.com/1200x630/?{','.join(broad)}", timeout=10)
                  if r.status_code == 200: return r.content
              except:
                  pass
              return None

          # === 1. Get articles from Vercel ===
          print("=== 从 Vercel 获取 RSS 数据 ===")
          try:
              resp = urllib.request.urlopen("https://globalchineaenews.com/api/crawler-data?secret=mynews2026", timeout=35)
              data = json.loads(resp.read().decode())
              articles = data.get("articles", [])
              print(f"获取 {len(articles)} 篇")
          except Exception as e:
              print(f"Vercel 失败: {e}")
              exit(1)
          if not articles: exit(0)

          # === 2. WP Login ===
          cj = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(cj))
          opener.open(urllib.request.Request(f"{WP}/wp-login.php", data=urllib.parse.urlencode({"log":"admin","pwd":"X3scdhTmzwls","wp-submit":"登入","testcookie":"1"}).encode()))
          nonce = opener.open(urllib.request.Request(f"{WP}/wp-admin/admin-ajax.php?action=rest-nonce")).read().decode().strip()
          before = int(opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1")).headers.get("X-WP-Total","0"))
          print(f"WP 登入成功，现有 {before} 篇\n")

          cat_map = {"world-cup":2,"breaking-news":3,"world":4,"cross-strait":5,"lifestyle":6,"immigration-study":7}
          cat_names = {2:"世盃",3:"即时",4:"国际",5:"两岸",6:"华人",7:"移民"}
          count = 0

          for i, art in enumerate(articles):
              if count >= MAX_ARTICLES: break

              cat = art.get("category","breaking-news")
              cat_id = cat_map.get(cat, 3)
              src_url = art["sourceUrl"]
              domain = art["domain"]

              # === Translate ===
              print(f"  [{i+1}/{len(articles)}] {art['title'][:60]}")
              zh_title = translate(art['title'][:120])
              zh_summary = translate(art['summary'][:350])
              zh_title = re.sub(r'【[^】]*】', '', zh_title).strip()
              prefixes = ['速報','快訊','最新','即時']
              zh_title = f"【{prefixes[hash(art['title'])%4]}】{zh_title[:100]}"

              # === Get matching image from Unsplash (based on article content) ===
              img_data = get_image(art['title'], zh_title)
              img_id = None

              if img_data:
                  boundary = f"---WP{i}---"
                  body = (f"--{boundary}\r\nContent-Disposition: form-data; name=\"file\"; filename=\"photo_{i}.jpg\"\r\nContent-Type: image/jpeg\r\n\r\n").encode() + img_data + f"\r\n--{boundary}--\r\n".encode()
                  try:
                      req = urllib.request.Request(f"{WP}/wp-json/wp/v2/media", data=body,
                          headers={"Content-Type":f"multipart/form-data; boundary={boundary}","X-WP-Nonce":nonce}, method="POST")
                      img_id = json.loads(opener.open(req).read().decode())["id"]
                      print(f"    配图: ✓ #{img_id}")
                  except Exception as e:
                      print(f"    配图: ✗ {str(e)[:60]}")

              # === Post ===
              img_html = f'<figure class="wp-block-image size-large"><img src="http://43.172.68.14/wp-content/uploads/2026/06/photo_{i}.jpg" alt="" style="width:100%;border-radius:8px;"/></figure>\n' if img_id else ''

              content = f'''{img_html}<p>{zh_summary}（本文為資訊摘要整理。）</p>
          <hr style="margin:24px 0;border:none;border-top:1px solid #e5e5e5;"/>
          <div style="background:#f8f8f8;padding:16px;border-radius:6px;font-size:13px;color:#666;line-height:1.8;">
          <p style="margin:0 0 8px;font-weight:600;color:#444;">📋 版權與免責聲明</p>
          <p style="margin:0 0 4px;">• 本文為新聞資訊摘要整理，原文來源：<a href="{src_url}" target="_blank" rel="noopener noreferrer nofollow" style="color:#c41e3a;">{domain}</a></p>
          <p style="margin:0 0 4px;">• 原文版權歸原作者及原發布機構所有，本網站僅在合理使用範圍內進行新聞摘要報導。</p>
          <p style="margin:0 0 4px;">• 本網站不為使用者轉載、引用本文內容所引發的任何法律爭議承擔責任。</p>
          <p style="margin:0;">• 如著作權人認為本文超出合理使用範圍，請通過<a href="https://globalchineaenews.com/takedown" style="color:#c41e3a;">侵權刪除頁面</a>聯繫我們，將在48小時內處理。</p>
          </div>'''

              body = json.dumps({"title":zh_title,"content":content,"status":"publish","categories":[cat_id],"featured_media":img_id or 0,"meta":{"_original_url":src_url,"_is_automated_fetch":True}}).encode()

              try:
                  resp = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts", data=body,
                      headers={"Content-Type":"application/json","X-WP-Nonce":nonce}, method="POST"))
                  pid = json.loads(resp.read().decode())["id"]
                  print(f"    发布: ✓ #{pid} [{cat_names.get(cat_id,'?')}] {zh_title[:50]}")
                  count += 1
                  time.sleep(2)
              except Exception as e:
                  print(f"    ✗ {str(e)[:80]}")

          after = opener.open(urllib.request.Request(f"{WP}/wp-json/wp/v2/posts?per_page=1")).headers.get("X-WP-Total","?")
          print(f"\n{'='*45}")
          print(f"发布: {count}篇 | 网站总数: {before}→{after}")
          print("所有文章: 繁体中文 + Unsplash 实拍配图")
          PYEOF
